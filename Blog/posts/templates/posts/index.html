{%extends 'base.html'%}
{%block title%}index{%endblock title%}
{%block body%}
    <h1>Welcome to Django</h1>
    {%for post in posts%}
       <a href="{%url 'detail' post.id%}" class="text-decoration-none text-dark"><h3> {{post.id}}-{{post.title}}</h3></a>
       <p><b>{{post.dis}}</b></p>
    {%empty%}
       <h1>No Posts Available</h1>
    {%endfor%}
{%endblock body%}
